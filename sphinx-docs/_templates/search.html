{% extends "furo/page.html" %}
{% block content %}
<h1>Search</h1>
<div id="search"></div>
<link href="{{ site_prefix }}/_pagefind/pagefind-ui.css" rel="stylesheet">
<script src="{{ site_prefix }}/_pagefind/pagefind-ui.js"></script>
<script>
window.addEventListener("DOMContentLoaded", function() {
    new PagefindUI({ element: "#search", showSubResults: true });
    var params = new URLSearchParams(window.location.search);
    var query = params.get("q");
    if (query) {
        var input = document.querySelector(".pagefind-ui__search-input");
        if (input) { input.value = query; input.dispatchEvent(new Event("input", { bubbles: true })); }
    }
});
</script>
{% endblock %}
