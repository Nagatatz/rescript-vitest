{% extends "furo/page.html" %}

{% block footer %}
{{ super() }}
<div class="language-switcher">
  <a href="{{ site_prefix }}/en/{{ pagename }}.html"{% if language == 'en' %} class="active"{% endif %}>EN</a>
  <span class="separator">|</span>
  <a href="{{ site_prefix }}/ja/{{ pagename }}.html"{% if language == 'ja' %} class="active"{% endif %}>JA</a>
</div>
{% endblock %}
