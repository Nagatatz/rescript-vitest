name: Release

# Publishes the package to npm when a version tag (e.g. v0.1.0) is pushed,
# using npm Trusted Publishing (OIDC) — no long-lived NPM_TOKEN secret.
#
# One-time setup on npmjs.com (package Settings → Trusted Publishers): register
# this repository + workflow (.github/workflows/release.yml) as a trusted
# GitHub Actions publisher. The trusted publisher can only be configured once
# the package exists, so publish 0.1.0 manually the first time, then every
# later tag publishes tokenlessly via this workflow.
on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write # required for OIDC trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      # Trusted publishing requires npm >= 11.5.1.
      - name: Update npm
        run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile

      - name: Build ReScript bindings
        run: pnpm build

      - name: Run tests
        run: pnpm test

      # Prerelease tags (e.g. v0.2.0-beta.5 — any semver containing a `-`)
      # publish to the `next` dist-tag so stable `latest` (vitest 4) stays put.
      - name: Publish to npm (OIDC trusted publishing)
        run: |
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            npm publish --access public --provenance --tag next
          else
            npm publish --access public --provenance
          fi
