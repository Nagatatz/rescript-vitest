name: Release

# Publishes the package to npm when a version tag (e.g. v0.1.0) is pushed.
# Requires an `NPM_TOKEN` repository secret (an npm automation token with
# publish access to the @nagatatz scope).
on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write # required for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Build ReScript bindings
        run: pnpm build

      - name: Run tests
        run: pnpm test

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
