name: Docs

on:
  push:
    branches: [main]
    paths: ['sphinx-docs/**']
  pull_request:
    branches: [main]
    paths: ['sphinx-docs/**']
  workflow_dispatch:

concurrency:
  group: ${{ github.event_name == 'push' && 'pages' || format('docs-{0}', github.head_ref) }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sphinx-docs

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Sphinx lint
        run: make sphinx-lint

      - name: Pytest
        run: make test

  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sphinx-docs

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Build site
        run: make build-all
        env:
          SPHINX_SITE_PREFIX: /${{ github.event.repository.name }}

      - name: Upload Pages artifact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v5
        with:
          path: sphinx-docs/_build/site

      - name: Link check
        run: make linkcheck
        continue-on-error: true

      - name: Report link check results
        if: always()
        run: |
          if [ -f _build/linkcheck/output.txt ]; then
            {
              echo "## 🔗 Link Check Results"
              echo '```'
              cat _build/linkcheck/output.txt
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

  deploy:
    if: github.event_name == 'push'
    needs: [lint-and-test, build]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
