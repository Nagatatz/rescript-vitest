name: 機能リクエスト
description: 新機能や改善を提案する
labels: [enhancement]
body:
  - type: textarea
    id: motivation
    attributes:
      label: 動機・背景
      description: なぜこの機能が必要か。解決したい課題や具体的なシナリオ
    validations:
      required: true
  - type: textarea
    id: proposed_solution
    attributes:
      label: 提案する解決策
      description: どのように実現するか。設計案、API イメージ、UI モックなど
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 代替案
      description: 検討した他の方法と、それを選ばなかった理由
  - type: textarea
    id: additional_context
    attributes:
      label: 補足
      description: 関連 Issue / PR、参考リンク、外部サービス連携の有無など
